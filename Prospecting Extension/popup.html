<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
      background: #f9fafb;
      color: #1f2937;
    }
    h2 {
      font-size: 15px;
      margin-bottom: 12px;
      color: #0a66c2;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
      transition: background 0.15s;
    }
    .btn-primary { background: #0a66c2; color: #fff; }
    .btn-primary:hover { background: #004182; }
    .btn-secondary { background: #e5e7eb; color: #1f2937; }
    .btn-secondary:hover { background: #d1d5db; }
    .btn-danger { background: #fee2e2; color: #b91c1c; }
    .btn-danger:hover { background: #fecaca; }
    #status {
      margin-top: 8px;
      font-size: 12px;
      min-height: 18px;
      color: #059669;
    }
    #status.error { color: #dc2626; }
    #count {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 12px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 11px;
    }
    th {
      text-align: left;
      padding: 4px 6px;
      background: #e5e7eb;
      font-weight: 600;
    }
    td {
      padding: 4px 6px;
      border-bottom: 1px solid #e5e7eb;
      max-width: 96px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    td a { color: #0a66c2; text-decoration: none; }
    td a:hover { text-decoration: underline; }
    #prospect-list { max-height: 200px; overflow-y: auto; margin-top: 8px; }
  </style>
</head>
<body>
  <h2>LinkedIn Prospecting</h2>
  <div id="count">0 profiles saved</div>
  <button id="scrape-btn" class="btn btn-primary">Add Current Profile</button>
  <button id="export-btn" class="btn btn-secondary">Export CSV</button>
  <button id="clear-btn" class="btn btn-danger">Clear All</button>
  <div id="status"></div>
  <div id="prospect-list"></div>
  <script src="popup.js"></script>
</body>
</html>
